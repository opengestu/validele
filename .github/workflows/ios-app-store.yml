name: iOS App Store

on:
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: "Upload the generated IPA to App Store Connect"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ios-app-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    runs-on: macos-15
    env:
      NODE_VERSION: "20"
      IOS_PROJECT_PATH: ios/App/App.xcodeproj
      IOS_SCHEME: App
      IOS_ARCHIVE_PATH: ${{ runner.temp }}/App.xcarchive
      IOS_EXPORT_PATH: ${{ runner.temp }}/ios-export
      IOS_EXPORT_OPTIONS_PATH: ${{ runner.temp }}/ExportOptions.plist
      IOS_BUNDLE_IDENTIFIER: com.validele.app
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Validate Apple signing secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$BUILD_CERTIFICATE_BASE64" || { echo "Missing BUILD_CERTIFICATE_BASE64"; exit 1; }
          test -n "$P12_PASSWORD" || { echo "Missing P12_PASSWORD"; exit 1; }
          test -n "$BUILD_PROVISION_PROFILE_BASE64" || { echo "Missing BUILD_PROVISION_PROFILE_BASE64"; exit 1; }
          test -n "$KEYCHAIN_PASSWORD" || { echo "Missing KEYCHAIN_PASSWORD"; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "Missing APPLE_TEAM_ID"; exit 1; }

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Archive iOS app
        run: |
          xcodebuild \
            -project "$IOS_PROJECT_PATH" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$IOS_ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            CODE_SIGN_STYLE=Automatic \
            clean archive

      - name: Create export options plist
        run: |
          cat > "$IOS_EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          mkdir -p "$IOS_EXPORT_PATH"
          xcodebuild \
            -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$IOS_EXPORT_PATH" \
            -exportOptionsPlist "$IOS_EXPORT_OPTIONS_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IOS_EXPORT_PATH }}/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Validate App Store Connect upload secrets
        if: ${{ github.event.inputs.upload_to_app_store == 'true' }}
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_STORE_CONNECT_APP_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_PASSWORD }}
        run: |
          test -n "$APP_STORE_CONNECT_USERNAME" || { echo "Missing APP_STORE_CONNECT_USERNAME"; exit 1; }
          test -n "$APP_STORE_CONNECT_APP_PASSWORD" || { echo "Missing APP_STORE_CONNECT_APP_PASSWORD"; exit 1; }

      - name: Upload IPA to App Store Connect
        if: ${{ github.event.inputs.upload_to_app_store == 'true' }}
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_STORE_CONNECT_APP_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_PASSWORD }}
          APP_STORE_CONNECT_PROVIDER_PUBLIC_ID: ${{ secrets.APP_STORE_CONNECT_PROVIDER_PUBLIC_ID }}
        run: |
          IPA_PATH="$(find "$IOS_EXPORT_PATH" -maxdepth 1 -name '*.ipa' | head -n 1)"
          test -n "$IPA_PATH" || { echo "IPA not found"; exit 1; }

          ARGS=(--upload-app -f "$IPA_PATH" -t ios -u "$APP_STORE_CONNECT_USERNAME" -p "$APP_STORE_CONNECT_APP_PASSWORD" --output-format json)

          if [ -n "$APP_STORE_CONNECT_PROVIDER_PUBLIC_ID" ]; then
            ARGS+=(--provider-public-id "$APP_STORE_CONNECT_PROVIDER_PUBLIC_ID")
          fi

          xcrun altool "${ARGS[@]}"
