<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Membre - Validel Admin</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #f8fafc, #e2e8f0);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 440px);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.3rem;
      }
      p {
        margin: 0 0 18px;
        color: #475569;
        line-height: 1.45;
      }
      .btn {
        border: 0;
        background: #0f172a;
        color: #fff;
        border-radius: 10px;
        padding: 12px 14px;
        width: 100%;
        cursor: pointer;
        font-weight: 600;
      }
      .hint {
        margin-top: 12px;
        font-size: 0.9rem;
        color: #64748b;
      }
      .actions {
        display: grid;
        gap: 10px;
      }
      .btn-secondary {
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        border-radius: 10px;
        padding: 12px 14px;
        width: 100%;
        cursor: pointer;
        font-weight: 600;
      }
      .error {
        margin-top: 10px;
        color: #b91c1c;
        font-size: 0.9rem;
      }
    </style>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <main class="card">
      <h1>Acces Admin Restreint</h1>
      <p>
        Cette zone est reservee aux membres invites. Connectez-vous avec l'email invite
        pour acceder au dashboard admin.
      </p>
      <div class="actions">
        <button id="open-login" class="btn" type="button">Se connecter en tant que membre invite</button>
        <button id="open-signup" class="btn-secondary" type="button">Premier acces: definir mon mot de passe</button>
      </div>
      <div id="hint" class="hint">Apres connexion, vous serez redirige vers la page admin.</div>
      <div id="error" class="error" aria-live="polite"></div>
    </main>

    <script>
      (function () {
        const errorEl = document.getElementById('error');
        const loginBtn = document.getElementById('open-login');
        const signupBtn = document.getElementById('open-signup');
        const hintEl = document.getElementById('hint');

        const readParams = () => {
          const query = new URLSearchParams(window.location.search || '');
          const hashRaw = (window.location.hash || '').replace(/^#/, '');
          const hash = new URLSearchParams(hashRaw);
          return {
            inviteToken: hash.get('invite_token') || query.get('invite_token') || '',
            recoveryToken: hash.get('recovery_token') || query.get('recovery_token') || '',
            confirmationToken: hash.get('confirmation_token') || query.get('confirmation_token') || '',
            emailChangeToken: hash.get('email_change_token') || query.get('email_change_token') || ''
          };
        };

        const tokenState = readParams();
        const hasTokenFlow = !!(
          tokenState.inviteToken ||
          tokenState.recoveryToken ||
          tokenState.confirmationToken ||
          tokenState.emailChangeToken
        );

        const showError = (msg) => {
          if (errorEl) errorEl.textContent = msg;
        };

        const showHint = (msg) => {
          if (hintEl) hintEl.textContent = msg;
        };

        const openByFlow = () => {
          if (tokenState.inviteToken) {
            window.netlifyIdentity.open('signup');
            showHint('Invitation detectee: definissez votre mot de passe, puis connectez-vous.');
            return;
          }
          if (tokenState.recoveryToken) {
            window.netlifyIdentity.open('recovery');
            showHint('Lien de recuperation detecte: choisissez un nouveau mot de passe.');
            return;
          }
          window.netlifyIdentity.open('login');
        };

        if (!window.netlifyIdentity) {
          showError('Netlify Identity non disponible. Verifiez la configuration du site.');
          return;
        }

        window.netlifyIdentity.on('init', function (user) {
          if (hasTokenFlow) {
            openByFlow();
            return;
          }
          if (user) {
            window.location.replace('/admin');
          }
        });

        window.netlifyIdentity.on('login', function () {
          window.location.replace('/admin');
        });

        window.netlifyIdentity.on('error', function (err) {
          const message = err && err.message ? err.message : 'Erreur de connexion.';
          showError(message);
        });

        window.netlifyIdentity.init();

        if (hasTokenFlow) {
          showHint('Lien d\'invitation detecte. Finalisez le mot de passe dans la fenetre Netlify.');
        }

        if (loginBtn) {
          loginBtn.addEventListener('click', function () {
            window.netlifyIdentity.open('login');
          });
        }

        if (signupBtn) {
          signupBtn.addEventListener('click', function () {
            window.netlifyIdentity.open('signup');
            showHint('Si vous etes invite, utilisez le lien recu par email puis definissez votre mot de passe.');
          });
        }
      })();
    </script>
  </body>
</html>
