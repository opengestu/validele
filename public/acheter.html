<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Validèl — Acheter en toute sécurité</title>

  <!-- Aperçu WhatsApp / réseaux (le robot lit ces balises, il n'exécute pas le JS
       ci-dessous : il voit donc la carte, tandis que les vrais visiteurs sont
       redirigés instantanément vers le bot). -->
  <meta property="og:title" content="Validel - Transactions securisees" />
  <meta property="og:description" content="Achetez en toute securite avec Validel : paiement protege jusqu'a la reception du produit." />
  <meta property="og:image" content="https://www.validel.shop/icons/validel-logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Validel" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Validel - Transactions securisees" />
  <meta name="twitter:image" content="https://www.validel.shop/icons/validel-logo.png" />

  <!-- Redirection IMMÉDIATE (dans le <head>, avant tout rendu) : aucune app React
       chargée -> plus de délai pendant lequel l'onglet réutilisé afficherait encore
       une ancienne page (ex. page d'échec PixPay). -->
  <script>
    (function () {
      // NB: doit rester identique à WHATSAPP_BOT_NUMBER (backend) /
      // VITE_WHATSAPP_BOT_NUMBER. Numéro public, donc valeur en dur ici assumée.
      var BOT_NUMBER = '221768171175';
      try {
        var m = String(location.pathname || '').match(/\/acheter\/([^\/?#]+)/);
        var code = m ? decodeURIComponent(m[1]).trim() : '';
        var bot = String(BOT_NUMBER).replace(/\D/g, '');
        if (code && bot) {
          var text = 'Bonjour 👋 Pour acheter ce produit (code ' + code +
            ') en toute securite avec Validel, appuyez sur Envoyer pour commencer.';
          location.replace('https://wa.me/' + bot + '?text=' + encodeURIComponent(text));
        } else if (code) {
          location.replace('/product/' + encodeURIComponent(code));
        } else {
          location.replace('/');
        }
      } catch (e) {
        location.replace('/');
      }
    })();
  </script>
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#374151;background:#f9fafb">
  Redirection vers WhatsApp…
</body>
</html>
