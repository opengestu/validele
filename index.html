<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Splash screen affiché avant l'initialisation React */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.4s ease-out;
      }
      #app-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        width: 86px;
        height: 86px;
        object-fit: contain;
        animation: splash-float 1.5s ease-in-out infinite;
      }
      .splash-dots {
        margin-top: 12px;
        display: flex;
        gap: 6px;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        background: rgba(17, 24, 39, 0.65);
        animation: splash-dot 1s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.12s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.24s; }
      @keyframes splash-float {
        0% { transform: translateY(0) scale(0.97); opacity: 0.9; }
        50% { transform: translateY(-4px) scale(1); opacity: 1; }
        100% { transform: translateY(0) scale(0.98); opacity: 0.95; }
      }
      @keyframes splash-dot {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
        40% { transform: translateY(-4px); opacity: 1; }
      }

      html[data-disable-dashboard-splash="1"] #app-splash {
        display: none !important;
      }
    </style>

    <script>
      (function () {
        try {
          var path = window.location.pathname || '';
          var isDashboardRoute =
            path.startsWith('/vendor') ||
            path.startsWith('/buyer') ||
            path.startsWith('/delivery') ||
            path.startsWith('/admin') ||
            path.startsWith('/orders') ||
            path.startsWith('/scanner');

          if (isDashboardRoute) {
            document.documentElement.setAttribute('data-disable-dashboard-splash', '1');
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validèl - Transactions Sécurisées</title>
    <meta name="description" content="Plateforme sécurisée de validation de livraisons par QR Code avec paiement sous séquestre" />
    <meta name="author" content="Validèl" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Validel Admin" />

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/validel-logo-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/validel-logo-16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <!-- Google Fonts - Typography Validèl -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="Validel - Transactions securisees" />
    <meta property="og:description" content="Plateforme securisee de validation de livraisons par QR Code avec paiement sous sequestre" />
    <meta property="og:site_name" content="Validel" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preload" as="image" href="/icons/validel-logo.png" />
  </head>

  <body>
    <div id="app-splash" aria-hidden="true">
      <img src="/icons/validel-logo.png" alt="Validel" class="splash-logo" />

        <span></span>
